<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팡쫀쿠 만들기</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <script src="js/main.js"></script>
  <body>
    <div class="screen">
      <!-- 뱃지 -->
      <div style="display: flex; align-items: center; gap: 40px">
        <div class="badge">
          <p>HTML / CSS / JavaScript</p>
        </div>
      </div>
      <!-- 메인 텍스트 -->
      <div class="mainText">
        <h2>
          CS 퀴즈로 <br />
          팡쫀쿠를 완성해 보세요!
        </h2>
        <p>
          10개의 퀴즈를 풀어 좋은 재료를 모아 <br />
          성공적인 팡쫀쿠를 만들어 보세요!
          <br />틀린다면 이상한 재료가 들어간답니다 !...!
        </p>
      </div>
      <!-- 두쫀쿠 이미지 -->
      <div>
        <img
          src="assets/main.png"
          alt="두쫀쿠 이미지"
          style="width: 100%; max-height: 400px; margin: 0"
        />
      </div>

      <!-- 퀴즈 정보 -->
      <div class="quizInfo">
        <div class="info" style="margin-right: 30px">
          <div class="circle" style="background-color: red"></div>
          <p>10 문제</p>
        </div>
        <div class="info">
          <div
            class="circle"
            style="background-color: var(--primary-green)"
          ></div>
          <p>15초 제한</p>
        </div>
      </div>

      <!-- 시작 버튼 -->
      <div class="startBtn">
        <button onclick="playClickSound()">팡쫀쿠 만들기</button>
      </div>
    </div>
  </body>
</html>
