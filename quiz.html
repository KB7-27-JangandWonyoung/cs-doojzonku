<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/quiz.css" />
  </head>
  <body>
    <div class="mobile-container">
      <header class="quiz-header">
        <div class="info-box">
          <img src="asset/ic_chef_hat.svg" width="27px" />
          <div>재료<br />1 / 10</div>
        </div>
        <div class="info-box">
          <img src="asset/ic_chef_hat.svg" width="27px" />
          <div>남은 시간<br />10 초</div>
        </div>
      </header>

      <section class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-fill"></div>
        </div>
        <div class="item-icons"></div>
      </section>

      <section class="visual-section">
        <div class="character-circle">
          <img src="asset/img_gred_1.png" />
        </div>
        <div class="product-image">
          <img src="asset/img_gred_wrong_1.png" />
        </div>
      </section>

      <main class="quiz-content">
        <div class="badge"><code>&lt;/&gt;</code> JavaScript</div>
        <h2 class="question">typeof null 의 결과는?</h2>
        <div class="code-box">
          <code>console.log(typeof null);</code>
        </div>

        <div class="options">
          <button class="option-item">
            <span class="option-number">1</span>
            <span class="option-text">선택지 내용</span>
          </button>

          <button class="option-item">
            <span class="option-number">2</span>
            <span class="option-text">선택지 내용</span>
          </button>

          <button class="option-item">
            <span class="option-number">3</span>
            <span class="option-text">선택지 내용</span>
          </button>

          <button class="option-item">
            <span class="option-number">4</span>
            <span class="option-text">선택지 내용</span>
          </button>
        </div>
      </main>

      <section class="explanation-section">
        <h3 class="explanation-title">해설</h3>
        <p class="explanation-text">
          typeof null의 결과는 "object"입니다. 이는 JavaScript 초기 버전에서
          생긴 역사적인 버그로, null이 객체로 잘못 분류되었기 때문입니다.
          현재까지도 호환성 때문에 유지되고 있습니다.
        </p>
      </section>

      <div class="quiz-bottom">
        <button id="check-btn">정답 확인하기</button>
      </div>
    </div>

    <script type="module" src="./js/quiz/main2.js"></script>
  </body>
</html>
